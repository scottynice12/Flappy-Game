<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Classic Flappy Bird game – HTML5 Canvas. Tap/click/space to fly. Avoid pipes and set high scores!">
    <meta name="author" content="GitHub Repo Ready">
    <title>🐦 Flappy Bird | Canvas Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a2f3a 0%, #041e26 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'VT323', 'Fira Code', monospace;
            touch-action: manipulation;
            padding: 16px;
        }

        .game-wrapper {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 48px;
            padding: 20px 20px 24px 20px;
            backdrop-filter: blur(1px);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
        }

        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            background-color: #4bc0c0;
            width: 100%;
            height: auto;
        }

        .stats-bar {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 32px;
            background: #1e2f2f;
            padding: 8px 28px;
            border-radius: 60px;
            color: #ffe2a4;
            text-shadow: 0 2px 0 #7a4c1a;
            font-weight: bold;
            font-size: 1.6rem;
            letter-spacing: 1px;
            border: 1px solid #f5c542;
            backdrop-filter: blur(4px);
        }

        .score-panel, .best-panel {
            display: flex;
            gap: 10px;
            align-items: baseline;
        }

        .label {
            font-size: 1.1rem;
            color: #cde6e6;
            text-shadow: none;
            font-weight: 600;
        }

        .score-number, .best-number {
            font-size: 2.2rem;
            font-weight: bold;
            color: #f9e05e;
            line-height: 1;
            font-family: monospace;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #f5b042;
            border: none;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 40px;
            color: #1f2e2e;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 5px 0 #a35117;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #a35117;
        }

        .instruction {
            margin-top: 14px;
            font-size: 0.85rem;
            background: #0b1c20c9;
            padding: 6px 20px;
            border-radius: 80px;
            color: #ddf4ff;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }

        .badge {
            margin-top: 12px;
            font-size: 0.7rem;
            color: #98bac3;
            text-align: center;
        }

        @media (max-width: 520px) {
            .stats-bar { gap: 20px; padding: 6px 18px; }
            .score-number, .best-number { font-size: 1.8rem; }
            button { font-size: 1rem; padding: 6px 16px; }
            .label { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-card">
        <canvas id="flappyCanvas" width="400" height="600"></canvas>
        <div class="stats-bar">
            <div class="score-panel">
                <span class="label">🐤 SCORE</span>
                <span class="score-number" id="currentScore">0</span>
            </div>
            <div class="best-panel">
                <span class="label">🏆 BEST</span>
                <span class="best-number" id="bestScore">0</span>
            </div>
        </div>
        <div class="action-buttons">
            <button id="restartButton" aria-label="Restart game">🔄 FLAP AGAIN</button>
        </div>
        <div class="instruction">
            🚀 SPACE  /  CLICK  /  TAP  →  FLY UP
        </div>
        <div class="badge">
            ✨ github ready | classic arcade
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------------- CANVAS & DIMENSIONS ----------------
        const canvas = document.getElementById('flappyCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = 400;
        const HEIGHT = 600;

        // ---------------- GAME PHYSICS ----------------
        const GRAVITY = 0.18;
        const JUMP_POWER = -4.65;
        const PIPE_WIDTH = 52;
        const PIPE_GAP_HEIGHT = 130;          // gap between upper and lower pipe
        const PIPE_SPACING = 215;              // horizontal distance between pipe centers
        const GROUND_Y = HEIGHT - 42;           // ground collision line
        const CEILING_Y = 6;                    // ceiling collision buffer

        // Bird data
        const BIRD_RADIUS = 12;
        const BIRD_FIXED_X = 70;                // bird fixed horizontal position 
        let birdY = HEIGHT / 2;
        let birdVelocity = 0;
        let birdAngle = 0;

        // Pipes array
        let pipes = [];
        let score = 0;
        let bestScore = 0;
        let gameActive = true;

        // Scroll speed and frame assist
        const SCROLL_SPEED = 2.5;
        let frameDelay = 0;

        // ---------------- HELPER FUNCTIONS ----------------
        function loadBestScore() {
            try {
                const saved = localStorage.getItem('flappyBirdBest');
                if (saved !== null && !isNaN(parseInt(saved))) {
                    bestScore = parseInt(saved);
                } else {
                    bestScore = 0;
                }
            } catch(e) { bestScore = 0; }
            document.getElementById('bestScore').innerText = bestScore;
        }

        function saveBestScore() {
            try {
                localStorage.setItem('flappyBirdBest', bestScore);
            } catch(e) { /* silent */ }
        }

        function updateScoreUI() {
            document.getElementById('currentScore').innerText = score;
            if (score > bestScore) {
                bestScore = score;
                document.getElementById('bestScore').innerText = bestScore;
                saveBestScore();
            }
        }

        // random pipe top height (ensures bottom gap stays inside canvas)
        function randomPipeTop() {
            const minTop = 45;
            const maxTop = GROUND_Y - PIPE_GAP_HEIGHT - 30;
            if (maxTop <= minTop) return minTop;
            return Math.floor(Math.random() * (maxTop - minTop + 1) + minTop);
        }

        // generate a new pipe object
        function createPipe(xPosition) {
            const topH = randomPipeTop();
            return {
                x: xPosition,
                topHeight: topH,
                bottomY: topH + PIPE_GAP_HEIGHT,
                counted: false
            };
        }

        // reset everything (new game)
        function resetGame() {
            gameActive = true;
            score = 0;
            birdY = HEIGHT / 2;
            birdVelocity = 0;
            birdAngle = 0;
            updateScoreUI();

            // build initial pipes: 3 pipes ahead
            pipes = [];
            let startX = WIDTH + 45;
            for (let i = 0; i < 3; i++) {
                pipes.push(createPipe(startX + i * PIPE_SPACING));
            }
        }

        // add pipe when needed (dynamic)
        function addPipeIfNeeded() {
            if (pipes.length === 0) {
                pipes.push(createPipe(WIDTH + 70));
                return;
            }
            const lastPipe = pipes[pipes.length - 1];
            if (lastPipe.x + PIPE_WIDTH <= WIDTH - PIPE_SPACING + 35) {
                pipes.push(createPipe(lastPipe.x + PIPE_SPACING));
            }
        }

        // update pipes: move left, scoring, remove offscreen
        function updatePipes() {
            for (let i = 0; i < pipes.length; i++) {
                const p = pipes[i];
                p.x -= SCROLL_SPEED;

                // scoring: when pipe's right edge passes bird's left center
                if (!p.counted && p.x + PIPE_WIDTH < BIRD_FIXED_X) {
                    p.counted = true;
                    score++;
                    updateScoreUI();
                }
            }
            // remove pipes that are completely off canvas
            pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);
            addPipeIfNeeded();
        }

        // collision detection (pipes + ground + ceiling)
        function isCollision() {
            // bird bounding box
            const birdLeft = BIRD_FIXED_X - BIRD_RADIUS;
            const birdRight = BIRD_FIXED_X + BIRD_RADIUS;
            const birdTop = birdY - BIRD_RADIUS;
            const birdBottom = birdY + BIRD_RADIUS;

            // ground and ceiling collision
            if (birdBottom >= GROUND_Y) return true;
            if (birdTop <= CEILING_Y) return true;

            // pipe collision
            for (const pipe of pipes) {
                const pipeLeft = pipe.x;
                const pipeRight = pipe.x + PIPE_WIDTH;
                if (birdRight > pipeLeft && birdLeft < pipeRight) {
                    // top pipe collision
                    if (birdTop < pipe.topHeight) return true;
                    // bottom pipe collision
                    if (birdBottom > pipe.bottomY) return true;
                }
            }
            return false;
        }

        // bird physics update (velocity, position, angle)
        function updateBird() {
            if (!gameActive) return;
            birdVelocity += GRAVITY;
            birdY += birdVelocity;

            // dynamic angle for visual flair
            let targetAngle = birdVelocity * 0.19;
            if (targetAngle > 0.85) targetAngle = 0.85;
            if (targetAngle < -0.65) targetAngle = -0.65;
            birdAngle = targetAngle;
        }

        // flap / jump action
        function flapBird() {
            if (!gameActive) return;
            birdVelocity = JUMP_POWER;
            birdAngle = -0.5;
            // tiny sound effect if you want? just visual / smooth
        }

        // check collisions and update gameActive status
        function handleCollisions() {
            if (!gameActive) return;
            if (isCollision()) {
                gameActive = false;
            }
        }

        // restart controller
        function restartGame() {
            resetGame();
            gameActive = true;
            birdVelocity = 0;
            birdY = HEIGHT / 2;
            birdAngle = 0;
        }

        // ---------- DRAWING MODULE (rich visual) ----------
        function drawSkyAndClouds() {
            const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            grad.addColorStop(0, '#7ad7f0');
            grad.addColorStop(0.65, '#3fa5c2');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // fluffy clouds
            ctx.fillStyle = 'rgba(255, 250, 225, 0.9)';
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            // cloud 1
            ctx.beginPath();
            ctx.ellipse(65, 70, 38, 32, 0, 0, Math.PI*2);
            ctx.ellipse(105, 58, 42, 35, 0, 0, Math.PI*2);
            ctx.ellipse(145, 68, 34, 30, 0, 0, Math.PI*2);
            ctx.fill();
            // cloud 2
            ctx.beginPath();
            ctx.ellipse(310, 130, 44, 36, 0, 0, Math.PI*2);
            ctx.ellipse(350, 120, 38, 32, 0, 0, Math.PI*2);
            ctx.ellipse(280, 126, 36, 30, 0, 0, Math.PI*2);
            ctx.fill();
            // cloud 3
            ctx.beginPath();
            ctx.ellipse(40, 240, 40, 32, 0, 0, Math.PI*2);
            ctx.ellipse(82, 232, 36, 30, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawGroundDetail() {
            // ground base
            ctx.fillStyle = '#876b42';
            ctx.fillRect(0, GROUND_Y, WIDTH, HEIGHT - GROUND_Y);
            ctx.fillStyle = '#5b3e1f';
            for (let i = 0; i < 14; i++) {
                ctx.fillRect(i * 38, GROUND_Y - 6, 22, 8);
            }
            ctx.fillStyle = '#8cb36c';
            ctx.fillRect(0, GROUND_Y - 7, WIDTH, 8);
            ctx.fillStyle = '#dbb05c';
            ctx.fillRect(0, GROUND_Y - 3, WIDTH, 4);
            // little grass dots
            ctx.fillStyle = '#5f8742';
            for (let i = 0; i < 18; i++) {
                ctx.fillRect(i * 27 + 5, GROUND_Y - 10, 3, 8);
            }
        }

        function drawPipesModern() {
            for (const pipe of pipes) {
                // top pipe body
                ctx.fillStyle = '#2b6e3f';
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
                ctx.fillStyle = '#1e572f';
                ctx.fillRect(pipe.x - 6, pipe.topHeight - 38, PIPE_WIDTH + 12, 38);
                // top rim
                ctx.fillStyle = '#f3bc5c';
                ctx.fillRect(pipe.x - 4, pipe.topHeight - 32, PIPE_WIDTH + 8, 20);
                // bottom pipe
                const bottomStart = pipe.bottomY;
                const bottomH = HEIGHT - bottomStart;
                ctx.fillStyle = '#2b6e3f';
                ctx.fillRect(pipe.x, bottomStart, PIPE_WIDTH, bottomH);
                ctx.fillStyle = '#1e572f';
                ctx.fillRect(pipe.x - 6, bottomStart, PIPE_WIDTH + 12, 38);
                ctx.fillStyle = '#f3bc5c';
                ctx.fillRect(pipe.x - 4, bottomStart + 8, PIPE_WIDTH + 8, 20);
                // inner edge shadows
                ctx.fillStyle = '#174d26';
                ctx.fillRect(pipe.x + 4, 0, 5, pipe.topHeight);
                ctx.fillRect(pipe.x + PIPE_WIDTH - 9, 0, 5, pipe.topHeight);
                ctx.fillRect(pipe.x + 4, bottomStart, 5, bottomH);
                ctx.fillRect(pipe.x + PIPE_WIDTH - 9, bottomStart, 5, bottomH);
            }
        }

        function drawBirdCharacter() {
            ctx.save();
            ctx.translate(BIRD_FIXED_X, birdY);
            ctx.rotate(birdAngle);
            // body
            ctx.shadowBlur = 3;
            ctx.fillStyle = '#efbc4a';
            ctx.beginPath();
            ctx.ellipse(0, 0, BIRD_RADIUS, BIRD_RADIUS * 0.92, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#d4942a';
            ctx.beginPath();
            ctx.ellipse(-3, -2, 4, 3.8, 0, 0, Math.PI*2);
            ctx.fill();
            // eye
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.arc(4, -3, 2.6, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(4.8, -4.2, 1, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(4.2, -3.2, 0.6, 0, Math.PI*2);
            ctx.fill();
            // beak
            ctx.fillStyle = '#e07a2c';
            ctx.beginPath();
            ctx.moveTo(11, -2.2);
            ctx.lineTo(17, -1);
            ctx.lineTo(11, 1.2);
            ctx.fill();
            // wing
            ctx.fillStyle = '#cf8629';
            ctx.beginPath();
            ctx.ellipse(-6, 3, 8, 5.2, -0.5, 0, Math.PI*2);
            ctx.fill();
            // tail feathers
            ctx.fillStyle = '#b66a1c';
            ctx.beginPath();
            ctx.moveTo(-11, 1);
            ctx.lineTo(-19, 5);
            ctx.lineTo(-11, 7);
            ctx.fill();
            ctx.restore();
            ctx.shadowBlur = 0;
        }

        function drawGameOverlay() {
            if (!gameActive) {
                ctx.font = 'bold 28px "Courier New", monospace';
                ctx.fillStyle = '#fff7cf';
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'black';
                ctx.fillText('☠️ FAILURE', WIDTH/2 - 102, HEIGHT/2 - 48);
                ctx.font = 'bold 17px monospace';
                ctx.fillStyle = '#fbe39c';
                ctx.fillText('press "FLAP AGAIN"', WIDTH/2 - 92, HEIGHT/2 + 20);
                ctx.font = '14px monospace';
                ctx.fillStyle = '#ffe0a3';
                ctx.fillText('⬇️ restart & fly ⬇️', WIDTH/2 - 72, HEIGHT/2 + 68);
            } else if (score === 0 && frameDelay < 25) {
                ctx.font = 'bold 16px "VT323", monospace';
                ctx.fillStyle = '#ffffd0';
                ctx.fillText('✨ click / space / tap ✨', WIDTH/2 - 112, HEIGHT - 58);
            }
        }

        // draw frame composition
        function drawFrame() {
            drawSkyAndClouds();
            drawPipesModern();
            drawGroundDetail();
            drawBirdCharacter();
            drawGameOverlay();
            // extra floating particles when game over? subtle
            if (!gameActive) {
                ctx.fillStyle = '#c9e9ff';
                ctx.font = 'italic 13px monospace';
                ctx.fillText('⚡ tap restart', WIDTH - 85, HEIGHT - 18);
            }
        }

        // ---------- GAME LOOP & UPDATE LOGIC ----------
        function updateGame() {
            if (gameActive) {
                updateBird();
                updatePipes();
                handleCollisions();
            }
        }

        let animationId = null;
        function gameLoop() {
            updateGame();
            drawFrame();
            frameDelay++;
            animationId = requestAnimationFrame(gameLoop);
        }

        // ---------- EVENT HANDLERS (keyboard, mouse, touch) ----------
        function onJump(e) {
            // prevent default space/up arrow scrolling
            if (e.type === 'keydown') {
                if (e.code === 'Space' || e.code === 'ArrowUp') {
                    e.preventDefault();
                    flapBird();
                    return false;
                }
            } else {
                e.preventDefault();
                flapBird();
            }
        }

        function onCanvasTap(e) {
            e.preventDefault();
            flapBird();
        }

        function onRestartClick() {
            restartGame();
        }

        function bindGlobalEvents() {
            window.addEventListener('keydown', onJump);
            canvas.addEventListener('click', onCanvasTap);
            canvas.addEventListener('touchstart', onCanvasTap, { passive: false });
            const restartBtn = document.getElementById('restartButton');
            restartBtn.addEventListener('click', (e) => {
                e.preventDefault();
                onRestartClick();
            });
            // extra: avoid accidental page scroll on space when anywhere
            document.body.addEventListener('keydown', (e) => {
                if (e.code === 'Space' || e.code === 'ArrowUp') {
                    if (!gameActive || document.activeElement === canvas) {
                        e.preventDefault();
                    }
                }
            });
        }

        // ---------- INITIALIZE GAME ----------
        function init() {
            loadBestScore();
            resetGame();           // builds pipes, score = 0
            updateScoreUI();
            bindGlobalEvents();
            gameLoop();
        }

        init();
    })();
</script>
</body>
</html>
